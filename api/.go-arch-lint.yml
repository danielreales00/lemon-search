# Architectural-drift enforcement for the Lemon Search Go service.
# Run:   go-arch-lint check --project-path .
# Docs:  https://github.com/fe3dback/go-arch-lint
#
# Hexagonal core:
#   - domain is pure (no I/O, no other internals)
#   - api is the composition root for HTTP transport
#   - retrieve/* are adapters implementing domain ports
#   - rank / intent / config / observ are scoped helpers
#   - cmd/* are entrypoints; only they wire things up

version: 3
workdir: .

allow:
  depOnAnyVendor: true
  deepScan: true

# ------- vendor-side guardrails -------
vendors:
  pgx:
    in: github.com/jackc/pgx/**
  pgxpool:
    in: github.com/jackc/pgx/v5/pgxpool/**
  yaml:
    in: gopkg.in/yaml.v3
  testify:
    in: github.com/stretchr/testify/**
  net-http:
    in: net/http
  hugot:
    in: github.com/knights-analytics/hugot/**

# ------- internal components -------
components:
  domain:
    in: internal/domain/**
  api:
    in: internal/api/**
  intent:
    in: internal/intent/**
  rank:
    in: internal/rank/**
  search:
    in: internal/search/**
  config:
    in: internal/config/**
  observ:
    in: internal/observ/**
  flags:
    in: internal/flags/**
  ingest:
    in: internal/ingest/**
  retrieve-postgres:
    in: internal/retrieve/postgres/**
  embed-ollama:
    in: internal/retrieve/embed/ollama/**
  embed-onnx:
    in: internal/retrieve/embed/onnx/**
  cmd-api:
    in: cmd/api/**
  cmd-ingest:
    in: cmd/ingest/**
  cmd-bench-runner:
    in: cmd/bench-runner/**
  cmd-loadbench:
    in: cmd/loadbench/**

# ------- import rules -------
# `mayDependOn` is an allowlist: anything not listed is forbidden. (There is no
# `cannotDependOn` in go-arch-lint — the allowlist already implies it.)
deps:
  # domain is pure: NO internal-component deps (mayDependOn: []). The component-
  # imports linter enforces that. Vendor checks are global (allow.depOnAnyVendor),
  # so anyVendorDeps:true here is a no-op that just satisfies go-arch-lint's
  # "must allow something" rule. domain's no-vendor intent is also enforced by
  # the `domain-pure` depguard rule in .golangci.yml.
  domain:
    mayDependOn: []
    anyVendorDeps: true

  # observ is a leaf utility (used by everyone above); no internal-component deps.
  observ:
    mayDependOn: []
    anyVendorDeps: true

  # flags is a leaf utility: reads env feature flags at the composition root.
  flags:
    mayDependOn: []
    anyVendorDeps: true

  # config can only see domain (loads typed config into domain shapes)
  config:
    mayDependOn: [domain]
    canUse: [yaml]

  # intent: lexicon → overlay; only domain types
  intent:
    mayDependOn: [domain]
    anyVendorDeps: false

  # rank: pure scoring; sees domain types + config
  rank:
    mayDependOn: [domain, config]
    anyVendorDeps: false

  # search: the search use-case. Orchestrates intent → retrieval → re-rank over
  # the domain ports; pure composition, no infra (no pgx, no net/http).
  search:
    mayDependOn: [domain, intent, rank, config, observ]
    anyVendorDeps: false

  # ingest: ingestion pipeline. The stream parser itself imports only stdlib;
  # later ingest stages compose domain shapes, config, logging, and the loader.
  ingest:
    mayDependOn: [domain, config, observ]
    canUse: [pgx, pgxpool, yaml]

  # retrieve-postgres: DB adapter; sees domain only
  retrieve-postgres:
    mayDependOn: [domain]
    canUse: [pgx, pgxpool]

  # embed-ollama: semantic-embedding adapter. Localhost-HTTP to Ollama (ADR-0006);
  # stdlib-only (net/http), sees domain types only — no DB, no other infra.
  embed-ollama:
    mayDependOn: [domain]
    canUse: [net-http]
    anyVendorDeps: false

  # embed-onnx: in-process embedding adapter (ADR-0006 E6 production runtime).
  # Runs all-MiniLM via hugot's pure-Go GoMLX backend (CGO_ENABLED=0, no native
  # libs); sees domain types only. embed-ollama is TEST-ONLY here — the parity
  # test (embedder_integration_test.go) compares vectors against the Ollama
  # adapter, and deepScan analyses *_test.go, so it must stay in the allowlist.
  embed-onnx:
    mayDependOn: [domain, embed-ollama]
    canUse: [hugot]

  # api: thin HTTP transport. Production code imports only domain, search, and
  # rank (verify: grep the non-test files) — intent/config/DB now live behind the
  # search service. config + retrieve-postgres are TEST-ONLY here: the e2e/search
  # tests wire a real service against a live DB, and go-arch-lint (deepScan) also
  # analyses *_test.go, so they must stay in the allowlist.
  api:
    mayDependOn: [domain, search, rank, observ, config, retrieve-postgres]
    canUse: [net-http]

  # cmd-api: composition root for the server. Constructs the query embedder —
  # Ollama (embed-ollama) or in-process ONNX (embed-onnx) per LEMON_EMBED_BACKEND
  # — for semantic recall when LEMON_FF_SEMANTIC is on (ADR-0006, E4/E6) and
  # injects it into the search service via the domain port.
  cmd-api:
    mayDependOn: [domain, api, search, intent, rank, config, observ, flags, retrieve-postgres, embed-ollama, embed-onnx]
    canUse: [net-http, pgx, pgxpool, yaml]

  # cmd-ingest: ingestion CLI. Also the composition root for the embedding pass
  # (ADR-0006, E3): it constructs the Ollama embedder adapter (embed-ollama,
  # localhost HTTP) and wires it into the ingest backfiller via the domain port.
  cmd-ingest:
    mayDependOn: [domain, ingest, retrieve-postgres, embed-ollama, config, observ]
    canUse: [pgx, pgxpool, yaml, net-http]

  # cmd-bench-runner: in-process bench harness; wires repo + config into the
  # search service (intent ON) so the bench measures the feature-ON path. Talks
  # to Meilisearch over its REST API (net/http) for the engine A/B, and builds the
  # Ollama embedder (embed-ollama) for the E5 semantic ON-vs-OFF go/no-go bench.
  cmd-bench-runner:
    mayDependOn: [domain, config, rank, search, retrieve-postgres, embed-ollama, embed-onnx]
    canUse: [pgx, pgxpool, net-http]

  # cmd-loadbench: standalone open-loop load generator. Talks to a running API
  # over HTTP only (net/http) — no internal deps, no DB. See docs/bench/plan.md.
  cmd-loadbench:
    mayDependOn: []
    canUse: [net-http]
