name: Deploy API → Fly.io

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "config/**"
      - "supabase/migrations/**"
      - "fly.toml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    # Gate on CI green for the same SHA.
    needs: []
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      # Fly.io isn't provisioned yet (see issue #22). Skip — rather than fail —
      # the deploy until FLY_API_TOKEN is set, so main stays green.
      - name: Check for Fly API token
        id: flytoken
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set — skipping deploy. Provision Fly.io and add the secret to enable."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.flytoken.outputs.present == 'true'
      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.flytoken.outputs.present == 'true'
      - name: Deploy
        if: steps.flytoken.outputs.present == 'true'
        run: flyctl deploy --remote-only --config fly.toml
