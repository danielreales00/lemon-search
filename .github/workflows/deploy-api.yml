name: Deploy API → EC2

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "config/**"
      - "deploy/ec2/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: ssh deploy
    runs-on: ubuntu-latest
    env:
      EC2_SSH_HOST: ${{ secrets.EC2_SSH_HOST }}
      EC2_SSH_USER: ${{ secrets.EC2_SSH_USER }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
    steps:
      # The EC2 box (ADR-0007) isn't provisioned until the secrets are set. Skip —
      # rather than fail — so main stays green until then. To enable, add
      # EC2_SSH_HOST / EC2_SSH_USER / EC2_SSH_KEY (a deploy private key) to the
      # repo's Actions secrets; the box must already be set up via deploy/ec2/setup.sh.
      - name: Check for EC2 SSH secrets
        id: ssh
        run: |
          if [ -z "$EC2_SSH_HOST" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2_SSH_* not set — skipping deploy. Provision the box and add the secrets to enable."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run remote deploy
        if: steps.ssh.outputs.present == 'true'
        run: |
          install -m 600 /dev/stdin /tmp/deploy_key <<< "$EC2_SSH_KEY"
          ssh -o StrictHostKeyChecking=accept-new -i /tmp/deploy_key \
            "${EC2_SSH_USER:-ubuntu}@${EC2_SSH_HOST}" \
            'sudo REPO_REF=main bash /opt/lemon/lemon-search/deploy/ec2/deploy.sh'
          rm -f /tmp/deploy_key
