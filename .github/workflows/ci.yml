name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------- Go
  go-lint:
    name: Go · lint (correctness + complexity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: api/go.sum
      - name: gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          unformatted=$(gofumpt -l api)
          if [ -n "$unformatted" ]; then
            echo "::error::gofumpt diffs:"
            echo "$unformatted"
            gofumpt -d api
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api
          args: --timeout=5m

  go-arch-lint:
    name: Go · arch drift (go-arch-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: api/go.sum
      - name: Install go-arch-lint
        run: go install github.com/fe3dback/go-arch-lint@latest
      - name: Check
        working-directory: api
        run: go-arch-lint check --project-path .

  go-test:
    name: Go · test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lemon_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      LEMON_DATABASE_URL: postgres://postgres:postgres@localhost:5432/lemon_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: api/go.sum
      - name: Install extensions and apply migrations
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d lemon_test \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" \
            -c "CREATE EXTENSION IF NOT EXISTS cube;" \
            -c "CREATE EXTENSION IF NOT EXISTS earthdistance;"
          for f in supabase/migrations/*.sql; do
            echo "Applying $f"
            PGPASSWORD=postgres psql -h localhost -U postgres -d lemon_test -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Test
        working-directory: api
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: api/coverage.out
          retention-days: 7

  go-build:
    name: Go · build
    runs-on: ubuntu-latest
    needs: [go-lint, go-arch-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: api/go.sum
      - name: Build binaries
        working-directory: api
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o bin/api ./cmd/api
          CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o bin/ingest ./cmd/ingest
      - uses: actions/upload-artifact@v4
        with:
          name: api-binaries
          path: api/bin/
          retention-days: 7

  # ---------------------------------------------------------------- Web
  web-lint:
    name: Web · lint + format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  web-typecheck:
    name: Web · typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  web-quality:
    name: Web · dead-code + cycles (knip + madge)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: knip (dead code / unused deps / unused exports)
        run: npm run knip
      - name: madge (circular deps)
        run: npm run madge

  web-build:
    name: Web · build
    runs-on: ubuntu-latest
    needs: [web-lint, web-typecheck]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  # ---------------------------------------------------------------- DB
  migrations-check:
    name: DB · migrations apply twice (idempotent)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lemon_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Apply migrations twice
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d lemon_test \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" \
            -c "CREATE EXTENSION IF NOT EXISTS cube;" \
            -c "CREATE EXTENSION IF NOT EXISTS earthdistance;"
          for run in 1 2; do
            echo "Migration pass $run"
            for f in supabase/migrations/*.sql; do
              PGPASSWORD=postgres psql -h localhost -U postgres -d lemon_test -v ON_ERROR_STOP=1 -f "$f"
            done
          done

  # ---------------------------------------------------------------- Cross-cutting
  secrets-scan:
    name: Secrets · gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  commitlint:
    name: Commits · conventional
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --no-save @commitlint/cli@^19 @commitlint/config-conventional@^19
      - name: Validate PR commits
        run: npx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose

  markdown-lint:
    name: Docs · markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --no-save markdownlint-cli2@^0.16
      - run: npx markdownlint-cli2 "**/*.md" "#node_modules" "#web/node_modules" "#.next"
