version: 2
updates:
  - package-ecosystem: gomod
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, go]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, web]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
